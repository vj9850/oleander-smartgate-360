<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Management – SmartGate 360</title>
  <link rel="icon" href="../assets/icons/logo.webp" type="image/webp" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <script>(function(){ const s = sessionStorage.getItem('sg360_session'); if (!s) window.location.replace('../index.html'); })();</script>
</head>
<body>
<div class="app-wrapper">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" id="mobile-menu-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <div class="topbar-title">SmartGate 360</div>
          <div class="topbar-breadcrumb">Masters / <span>Staff Management</span></div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-date" id="topbar-date"></div>
        <div class="topbar-user">
          <div class="user-avatar" id="user-avatar">–</div>
          <div class="user-info">
            <div class="user-name" id="user-name">–</div>
            <div class="user-role" id="user-role">–</div>
          </div>
        </div>
      </div>
    </header>
    <div class="page-content" id="page-content"></div>
  </div>
</div>
<script src="../js/app.js"></script>
<script src="../js/masters.js"></script>
<script>
new MasterPage({
  key:          'sg360_staff',
  dataFile:     '../data/staff.json',
  activeModule: 'staff',
  title:        'Staff Management',
  subtitle:     'Manage all resort staff members, departments and designations',
  itemLabel:    'Staff Member',
  idPrefix:     'STF',
  idField:      'staffId',
  pageSize:     10,

  stats: [
    { label: 'Total Staff',      color: 'green'  },
    { label: 'Active',           color: 'teal',  filterKey: 'status', filterValue: 'Active' },
    { label: 'Inactive',         color: 'red',   filterKey: 'status', filterValue: 'Inactive' },
    { label: 'Security Dept.',   color: 'orange', filterKey: 'department', filterValue: 'Security' }
  ],

  columns: [
    { key: 'staffId',     label: 'Staff ID',    type: 'id' },
    { key: 'name',        label: 'Full Name',   type: 'bold' },
    { key: 'department',  label: 'Department',  type: 'badge' },
    { key: 'designation', label: 'Designation', type: 'muted' },
    { key: 'mobile',      label: 'Mobile',      type: 'mono' },
    { key: 'joiningDate', label: 'Joined',      type: 'date' }
  ],

  searchKeys: ['name', 'staffId', 'department', 'designation', 'mobile', 'email'],

  filters: [
    { field: 'department', label: 'Departments', options: ['Security', 'Housekeeping', 'Front Office', 'Maintenance', 'Restaurant', 'Spa', 'Events', 'Management'] },
    { field: 'status',     label: 'Status',      options: ['Active', 'Inactive'] }
  ],

  fields: [
    { name: 'name',        label: 'Full Name',     type: 'text',     required: true,  placeholder: 'Enter full name' },
    { name: 'department',  label: 'Department',    type: 'select',   required: true,  options: ['Security', 'Housekeeping', 'Front Office', 'Maintenance', 'Restaurant', 'Spa', 'Events', 'Management'] },
    { name: 'designation', label: 'Designation',   type: 'text',     required: true,  placeholder: 'Job title or role' },
    { name: 'mobile',      label: 'Mobile',        type: 'tel',      required: true,  placeholder: '10-digit mobile' },
    { name: 'email',       label: 'Email',         type: 'email',    required: false, placeholder: 'work email' },
    { name: 'joiningDate', label: 'Joining Date',  type: 'date',     required: false },
    { name: 'idProofType', label: 'ID Proof Type', type: 'select',   required: false, options: ['Aadhar Card', 'Passport', 'Driving Licence', 'Voter ID', 'PAN Card'] },
    { name: 'idNumber',    label: 'ID Number',     type: 'text',     required: false, placeholder: 'ID proof number' },
    { name: 'role',        label: 'System Role',   type: 'select',   required: false, options: ['Security Guard', 'Gate Operator', 'Receptionist', 'Vehicle Manager', 'Inventory Manager', 'Housekeeping Manager', 'Event Manager', 'Maintenance Staff', 'Admin'] },
    { name: 'notes',       label: 'Notes',         type: 'textarea', required: false, full: true, placeholder: 'Additional information...' }
  ]
}).init();
</script>
</body>
</html>
