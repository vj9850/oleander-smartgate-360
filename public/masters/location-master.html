<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Location Management – SmartGate 360</title>
  <link rel="icon" href="../assets/icons/logo.webp" type="image/webp" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <script>(function(){ const s = sessionStorage.getItem('sg360_session'); if (!s) window.location.replace('../index.html'); })();</script>
</head>
<body>
<div class="app-wrapper">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" id="mobile-menu-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <div class="topbar-title">SmartGate 360</div>
          <div class="topbar-breadcrumb">Masters / <span>Locations</span></div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-date" id="topbar-date"></div>
        <div class="topbar-user">
          <div class="user-avatar" id="user-avatar">–</div>
          <div class="user-info">
            <div class="user-name" id="user-name">–</div>
            <div class="user-role" id="user-role">–</div>
          </div>
        </div>
      </div>
    </header>
    <div class="page-content" id="page-content"></div>
  </div>
</div>
<script src="../js/app.js"></script>
<script src="../js/masters.js"></script>
<script>
new MasterPage({
  key:          'sg360_locations',
  dataFile:     '../data/locations.json',
  activeModule: 'location',
  title:        'Location Management',
  subtitle:     'All zones, areas and venues across the 180-acre Oleander Farms property',
  itemLabel:    'Location',
  idPrefix:     'LOC',
  idField:      'locationId',
  pageSize:     10,

  stats: [
    { label: 'Total Locations',  color: 'green' },
    { label: 'Active',           color: 'teal',   filterKey: 'status',   filterValue: 'Active' },
    { label: 'Accommodation',    color: 'blue',   filterKey: 'category', filterValue: 'Accommodation' },
    { label: 'Food & Beverage',  color: 'orange', filterKey: 'category', filterValue: 'Food & Beverage' }
  ],

  columns: [
    { key: 'locationId',  label: 'Location ID', type: 'id' },
    { key: 'name',        label: 'Location',    type: 'bold' },
    { key: 'category',    label: 'Category',    type: 'badge' },
    { key: 'description', label: 'Description', type: 'muted' }
  ],

  searchKeys: ['name', 'locationId', 'category', 'description'],

  filters: [
    { field: 'category', label: 'Categories', options: ['Accommodation', 'Food & Beverage', 'Retail', 'Wellness', 'Sports & Recreation', 'Experiences', 'Events', 'Facility'] },
    { field: 'status',   label: 'Status',     options: ['Active', 'Inactive'] }
  ],

  fields: [
    { name: 'name',        label: 'Location Name', type: 'text',     required: true,  placeholder: 'e.g. Saltt Restaurant' },
    { name: 'category',    label: 'Category',      type: 'select',   required: true,  options: ['Accommodation', 'Food & Beverage', 'Retail', 'Wellness', 'Sports & Recreation', 'Experiences', 'Events', 'Facility'] },
    { name: 'description', label: 'Description',   type: 'textarea', required: false, full: true, placeholder: 'Brief description of the location' }
  ]
}).init();
</script>
</body>
</html>
