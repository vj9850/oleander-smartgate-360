<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Department Management – SmartGate 360</title>
  <link rel="icon" href="../assets/icons/logo.webp" type="image/webp" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <script>(function(){ const s = sessionStorage.getItem('sg360_session'); if (!s) window.location.replace('../index.html'); })();</script>
</head>
<body>
<div class="app-wrapper">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" id="mobile-menu-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <div class="topbar-title">SmartGate 360</div>
          <div class="topbar-breadcrumb">Masters / <span>Department Management</span></div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-date" id="topbar-date"></div>
        <div class="topbar-user">
          <div class="user-avatar" id="user-avatar">–</div>
          <div class="user-info">
            <div class="user-name" id="user-name">–</div>
            <div class="user-role" id="user-role">–</div>
          </div>
        </div>
      </div>
    </header>
    <div class="page-content" id="page-content"></div>
  </div>
</div>
<script src="../js/app.js"></script>
<script src="../js/masters.js"></script>
<script>
new MasterPage({
  key:          'sg360_departments',
  dataFile:     '../data/departments.json',
  activeModule: 'dept',
  title:        'Department Management',
  subtitle:     'Manage all resort departments, department heads and contact extensions',
  itemLabel:    'Department',
  idPrefix:     'DEP',
  idField:      'deptId',
  pageSize:     10,

  stats: [
    { label: 'Total Departments', color: 'green' },
    { label: 'Active',            color: 'teal',   filterKey: 'status', filterValue: 'Active' },
    { label: 'Total Staff',       color: 'blue',   countFn: all => all.reduce((s, d) => s + (Number(d.staffCount) || 0), 0) },
    { label: 'Inactive',          color: 'red',    filterKey: 'status', filterValue: 'Inactive' }
  ],

  columns: [
    { key: 'deptId',           label: 'Dept. ID',   type: 'id' },
    { key: 'name',             label: 'Department', type: 'bold' },
    { key: 'head',             label: 'Dept. Head', type: 'muted' },
    { key: 'staffCount',       label: 'Staff',      type: 'number' },
    { key: 'contactExtension', label: 'Extension',  type: 'mono' },
    { key: 'description',      label: 'Description',type: 'muted' }
  ],

  searchKeys: ['name', 'deptId', 'head', 'description', 'contactExtension'],

  filters: [
    { field: 'status', label: 'Status', options: ['Active', 'Inactive'] }
  ],

  fields: [
    { name: 'name',             label: 'Department Name',   type: 'text',     required: true,  placeholder: 'e.g. Housekeeping' },
    { name: 'head',             label: 'Department Head',   type: 'text',     required: true,  placeholder: 'Name of department head' },
    { name: 'staffCount',       label: 'Staff Count',       type: 'number',   required: false, placeholder: 'Number of staff' },
    { name: 'contactExtension', label: 'Contact Extension', type: 'text',     required: false, placeholder: 'e.g. 101' },
    { name: 'description',      label: 'Description',       type: 'textarea', required: false, full: true, placeholder: 'Department scope and responsibilities' }
  ]
}).init();
</script>
</body>
</html>
