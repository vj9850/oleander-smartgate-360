<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visitor Details – SmartGate 360</title>
  <link rel="icon" href="../assets/icons/logo.webp" type="image/webp" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <script>
    (function(){ const s = sessionStorage.getItem('sg360_session'); if (!s) window.location.replace('../index.html'); })();
  </script>
</head>
<body>
<div class="sidebar-backdrop" id="sidebar-backdrop"></div>
<div class="app-wrapper">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- MAIN -->
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" id="mobile-menu-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <div class="topbar-title">SmartGate 360</div>
          <div class="topbar-breadcrumb">Visitor Module / All Visitors / <span>Visitor Details</span></div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-date" id="topbar-date"></div>
        <div class="topbar-user">
          <div class="user-avatar" id="user-avatar">–</div>
          <div class="user-info">
            <div class="user-name" id="user-name">–</div>
            <div class="user-role" id="user-role">–</div>
          </div>
        </div>
      </div>
    </header>

    <div class="page-content" id="page-main" style="display:none;">

      <!-- Back + Actions -->
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px;">
        <a href="visitor-list.html" class="back-link" style="margin-bottom:0;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          Back to All Visitors
        </a>
        <div class="print-hide" style="display:flex;gap:8px;flex-wrap:wrap;" id="action-btns"></div>
      </div>

      <!-- Two-col layout -->
      <div class="two-col-layout" style="margin-bottom:24px;">

        <!-- LEFT: Profile Card -->
        <div class="vis-profile-card">
          <div class="vis-profile-avatar" id="profile-avatar"></div>
          <div class="vis-profile-name" id="profile-name"></div>
          <div style="text-align:center;margin-bottom:12px;">
            <div class="vis-profile-passid" id="profile-passid"></div>
          </div>
          <div class="vis-profile-badges" id="profile-badges"></div>
          <div class="divider"></div>
          <ul class="vis-profile-info-list" id="profile-info-list"></ul>
        </div>

        <!-- RIGHT: Visit Details -->
        <div class="section-card">
          <div class="section-header"><h2>Visit Details</h2></div>
          <div style="padding:16px 22px;">
            <div class="info-grid" id="visit-info-grid"></div>
            <div id="blacklist-reason-box" style="display:none;margin-top:16px;"></div>
          </div>
        </div>

      </div>

      <!-- Timeline -->
      <div class="section-card" style="margin-bottom:24px;">
        <div class="section-header"><h2>Activity Timeline</h2></div>
        <div style="padding:20px 28px;">
          <div class="timeline" id="activity-timeline"></div>
        </div>
      </div>

      <!-- Host Notification -->
      <div id="notification-section" style="display:none;margin-bottom:24px;">
        <div class="notification-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.1a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          <span id="notification-text"></span>
        </div>
      </div>

    </div>

    <div id="page-loading" style="padding:60px;text-align:center;color:var(--text-muted);">Loading visitor details…</div>
  </div>
</div>

<!-- Blacklist Modal -->
<div class="modal-overlay" id="blacklist-modal">
  <div class="modal">
    <h3>Blacklist Visitor</h3>
    <p>Provide a reason for blacklisting <strong id="bl-name"></strong>. This will flag them across the system.</p>
    <div class="form-group" style="margin-bottom:16px;">
      <label class="form-label">Reason <span class="required">*</span></label>
      <textarea class="form-textarea" id="bl-reason" placeholder="Describe the reason…" rows="3"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('blacklist-modal')">Cancel</button>
      <button class="btn btn-danger" id="bl-confirm-btn">Confirm Blacklist</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/visitor.js"></script>
<script>
(async function () {
  initVPage('visitor-details');
  await seedIfEmpty(KEYS.visitors, '../visitor/visitor-data.json');
  VM.refreshOverstay();

  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { window.location.replace('visitor-list.html'); return; }

  const v = VM.getById(id);
  if (!v) { window.location.replace('visitor-list.html'); return; }

  document.getElementById('page-loading').style.display = 'none';
  document.getElementById('page-main').style.display = 'block';

  renderProfile(v);
  renderActions(v);
  renderVisitDetails(v);
  renderTimeline(v);
  renderNotification(v);

  document.getElementById('bl-confirm-btn').addEventListener('click', function () {
    const reason = document.getElementById('bl-reason').value.trim();
    if (!reason) { showToast('Please provide a reason', 'warning'); return; }
    VM.blacklist(id, reason);
    showToast('Visitor blacklisted', 'warning');
    closeModal('blacklist-modal');
    const updated = VM.getById(id);
    renderProfile(updated);
    renderActions(updated);
    renderVisitDetails(updated);
    renderTimeline(updated);
    renderNotification(updated);
  });
})();

function renderProfile(v) {
  document.getElementById('profile-avatar').innerHTML = visAvatar(v.name, v.visitorType, v.photo, 80);
  document.getElementById('profile-name').textContent = v.name;
  document.getElementById('profile-passid').textContent = v.passId;
  document.getElementById('profile-badges').innerHTML = visBadge(v.visitorType) + ' ' + visStatus(v.status);

  document.getElementById('profile-info-list').innerHTML = [
    ['Mobile', v.mobile],
    ['Email', v.email || '—'],
    ['ID Proof', `${v.idProofType}`],
    ['ID Number', v.idNumber],
    ['Vehicle', v.vehicleNumber || '—'],
    ['Gate', v.gate]
  ].map(([l, val]) => `
    <li>
      <span class="pil-label">${l}</span>
      <span class="pil-value">${val}</span>
    </li>`).join('');
}

function renderActions(v) {
  const btns = document.getElementById('action-btns');
  let html = '';

  if (v.status === 'Active' || v.status === 'Overstayed') {
    html += `<button class="btn btn-primary" onclick="doCheckout('${v.id}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Check-Out
    </button>`;
  }
  html += `<a class="btn btn-outline" href="visitor-pass.html?id=${v.id}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    View Pass
  </a>`;

  if (!v.blacklisted) {
    html += `<button class="btn btn-danger" onclick="promptBlacklist('${v.id}','${v.name.replace(/'/g,"\\'")}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
      Blacklist
    </button>`;
  } else {
    html += `<button class="btn btn-outline" onclick="doUnblacklist('${v.id}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      Remove Blacklist
    </button>`;
  }

  html += `<button class="btn btn-ghost" onclick="window.print()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    Print
  </button>`;

  btns.innerHTML = html;
}

function renderVisitDetails(v) {
  document.getElementById('visit-info-grid').innerHTML = [
    ['Host', v.host],
    ['Location', v.location],
    ['Purpose', v.purpose],
    ['Entry Time', formatDateTime(v.entryTime)],
    ['Exit Time', v.exitTime ? formatDateTime(v.exitTime) : '—'],
    ['Duration', VM.duration(v.entryTime, v.exitTime)],
    ['Gate', v.gate],
    ['Visitor Type', v.visitorType]
  ].map(([l, val]) => `
    <div class="info-item">
      <span class="info-label">${l}</span>
      <span class="info-value">${val}</span>
    </div>`).join('');

  const box = document.getElementById('blacklist-reason-box');
  if (v.blacklisted && v.blacklistReason) {
    box.style.display = 'block';
    box.innerHTML = `
      <div class="alert alert-error">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;flex-shrink:0;"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
        <div><strong>Blacklist Reason:</strong> ${v.blacklistReason}</div>
      </div>`;
  } else {
    box.style.display = 'none';
  }
}

function renderTimeline(v) {
  const items = [];

  items.push({ dot: 'green', time: v.entryTime, text: 'Visitor Registered', sub: `Registered via SmartGate 360` });
  items.push({ dot: 'green', time: v.entryTime, text: 'Checked In', sub: `Entered through ${v.gate}` });

  if (v.status === 'Overstayed') {
    items.push({ dot: 'orange', time: null, text: 'Overstay Alert', sub: 'Visitor has exceeded 8-hour limit' });
  }
  if (v.exitTime) {
    items.push({ dot: 'gray', time: v.exitTime, text: 'Checked Out', sub: `Exited · Duration: ${VM.duration(v.entryTime, v.exitTime)}` });
  }
  if (v.blacklisted) {
    items.push({ dot: 'red', time: null, text: 'Blacklisted', sub: v.blacklistReason || 'Marked as blacklisted by security' });
  }

  document.getElementById('activity-timeline').innerHTML = items.map(item => `
    <div class="timeline-item">
      <div class="timeline-dot ${item.dot}"></div>
      <div class="timeline-content">
        ${item.time ? `<div class="tl-time">${formatDateTime(item.time)}</div>` : ''}
        <div class="tl-text">${item.text}</div>
        <div class="tl-sub">${item.sub}</div>
      </div>
    </div>`).join('');
}

function renderNotification(v) {
  const sec = document.getElementById('notification-section');
  if (v.status === 'Active' || v.status === 'Overstayed') {
    sec.style.display = 'block';
    document.getElementById('notification-text').textContent =
      `Notification sent to ${v.host} at check-in (${formatDateTime(v.entryTime)}). Host has been informed of the visitor's arrival.`;
  } else {
    sec.style.display = 'none';
  }
}

function doCheckout(id) {
  if (VM.checkOut(id)) {
    showToast('Visitor checked out successfully', 'success');
    const updated = VM.getById(id);
    renderProfile(updated);
    renderActions(updated);
    renderVisitDetails(updated);
    renderTimeline(updated);
    renderNotification(updated);
  } else {
    showToast('Could not check out visitor', 'error');
  }
}

function promptBlacklist(id, name) {
  document.getElementById('bl-name').textContent = name;
  document.getElementById('bl-reason').value = '';
  openModal('blacklist-modal');
}

function doUnblacklist(id) {
  if (confirm('Remove this visitor from the blacklist?')) {
    VM.unblacklist(id);
    showToast('Visitor removed from blacklist', 'success');
    const updated = VM.getById(id);
    renderProfile(updated);
    renderActions(updated);
    renderVisitDetails(updated);
    renderTimeline(updated);
    renderNotification(updated);
  }
}
</script>
</body>
</html>
