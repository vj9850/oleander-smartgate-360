<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gate Management – SmartGate 360</title>
  <link rel="icon" href="../assets/icons/logo.webp" type="image/webp" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <script>(function(){ const s = sessionStorage.getItem('sg360_session'); if (!s) window.location.replace('../index.html'); })();</script>
</head>
<body>
<div class="app-wrapper">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" id="mobile-menu-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <div class="topbar-title">SmartGate 360</div>
          <div class="topbar-breadcrumb">Masters / <span>Gate Management</span></div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-date" id="topbar-date"></div>
        <div class="topbar-user">
          <div class="user-avatar" id="user-avatar">–</div>
          <div class="user-info">
            <div class="user-name" id="user-name">–</div>
            <div class="user-role" id="user-role">–</div>
          </div>
        </div>
      </div>
    </header>
    <div class="page-content" id="page-content"></div>
  </div>
</div>
<script src="../js/app.js"></script>
<script src="../js/masters.js"></script>
<script>
new MasterPage({
  key:          'sg360_gates',
  dataFile:     '../data/gates.json',
  activeModule: 'gate',
  title:        'Gate Management',
  subtitle:     'Manage all entry and exit gates across the Oleander Farms property',
  itemLabel:    'Gate',
  idPrefix:     'GT',
  idField:      'gateId',
  pageSize:     10,

  stats: [
    { label: 'Total Gates',    color: 'green' },
    { label: 'Active',         color: 'teal',   filterKey: 'status',   filterValue: 'Active' },
    { label: 'Entry / Exit',   color: 'blue',   filterKey: 'gateType', filterValue: 'Entry / Exit' },
    { label: 'Entry Only',     color: 'orange', filterKey: 'gateType', filterValue: 'Entry Only' }
  ],

  columns: [
    { key: 'gateId',      label: 'Gate ID',    type: 'id' },
    { key: 'name',        label: 'Gate Name',  type: 'bold' },
    { key: 'gateType',    label: 'Gate Type',  type: 'badge' },
    { key: 'location',    label: 'Location',   type: 'muted' },
    { key: 'description', label: 'Description',type: 'muted' }
  ],

  searchKeys: ['name', 'gateId', 'gateType', 'location', 'description'],

  filters: [
    { field: 'gateType', label: 'Gate Types', options: ['Entry / Exit', 'Entry Only', 'Exit Only'] },
    { field: 'status',   label: 'Status',     options: ['Active', 'Inactive'] }
  ],

  fields: [
    { name: 'name',        label: 'Gate Name',  type: 'text',     required: true,  placeholder: 'e.g. Main Gate' },
    { name: 'gateType',    label: 'Gate Type',  type: 'select',   required: true,  options: ['Entry / Exit', 'Entry Only', 'Exit Only'] },
    { name: 'location',    label: 'Location',   type: 'text',     required: true,  placeholder: 'e.g. NH-48 Highway Frontage' },
    { name: 'description', label: 'Description',type: 'textarea', required: false, full: true, placeholder: 'Gate purpose and access notes' }
  ]
}).init();
</script>
</body>
</html>
