<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visitor Types – SmartGate 360</title>
  <link rel="icon" href="../assets/icons/logo.webp" type="image/webp" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <script>(function(){ const s = sessionStorage.getItem('sg360_session'); if (!s) window.location.replace('../index.html'); })();</script>
</head>
<body>
<div class="app-wrapper">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" id="mobile-menu-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <div class="topbar-title">SmartGate 360</div>
          <div class="topbar-breadcrumb">Masters / <span>Visitor Types</span></div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-date" id="topbar-date"></div>
        <div class="topbar-user">
          <div class="user-avatar" id="user-avatar">–</div>
          <div class="user-info">
            <div class="user-name" id="user-name">–</div>
            <div class="user-role" id="user-role">–</div>
          </div>
        </div>
      </div>
    </header>
    <div class="page-content" id="page-content"></div>
  </div>
</div>
<script src="../js/app.js"></script>
<script src="../js/masters.js"></script>
<script>
new MasterPage({
  key:          'sg360_visitor_types',
  dataFile:     '../data/visitor-types.json',
  activeModule: 'visitortype',
  title:        'Visitor Types',
  subtitle:     'Define visitor categories and their property access levels',
  itemLabel:    'Visitor Type',
  idPrefix:     'VT',
  idField:      'typeId',
  pageSize:     10,

  stats: [
    { label: 'Total Types',   color: 'green' },
    { label: 'Active',        color: 'teal',  filterKey: 'status', filterValue: 'Active' },
    { label: 'Full Access',   color: 'blue',  filterKey: 'accessLevel', filterValue: 'Full Property' },
    { label: 'Restricted',    color: 'orange', countFn: all => all.filter(v => v.accessLevel && v.accessLevel !== 'Full Property').length }
  ],

  columns: [
    { key: 'typeId',      label: 'Type ID',      type: 'id' },
    { key: 'name',        label: 'Type Name',    type: 'bold' },
    { key: 'accessLevel', label: 'Access Level', type: 'badge' },
    { key: 'description', label: 'Description',  type: 'muted' }
  ],

  searchKeys: ['name', 'typeId', 'description', 'accessLevel'],

  filters: [
    { field: 'accessLevel', label: 'Access Levels', options: ['Full Property', 'Service Areas Only', 'Reception & Service Gate', 'Event Venue Only', 'Maintenance Areas'] },
    { field: 'status',      label: 'Status',        options: ['Active', 'Inactive'] }
  ],

  fields: [
    { name: 'name',        label: 'Type Name',    type: 'text',     required: true,  placeholder: 'e.g. Event Guest' },
    { name: 'accessLevel', label: 'Access Level', type: 'select',   required: true,  options: ['Full Property', 'Service Areas Only', 'Reception & Service Gate', 'Event Venue Only', 'Maintenance Areas'] },
    { name: 'description', label: 'Description',  type: 'textarea', required: false, full: true, placeholder: 'Who this visitor type applies to' }
  ]
}).init();
</script>
</body>
</html>
