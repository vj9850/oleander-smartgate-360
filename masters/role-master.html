<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Role Management – SmartGate 360</title>
  <link rel="icon" href="../assets/icons/logo.webp" type="image/webp" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <script>(function(){ const s = sessionStorage.getItem('sg360_session'); if (!s) window.location.replace('../index.html'); })();</script>
</head>
<body>
<div class="app-wrapper">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" id="mobile-menu-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <div class="topbar-title">SmartGate 360</div>
          <div class="topbar-breadcrumb">Masters / <span>Role Management</span></div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-date" id="topbar-date"></div>
        <div class="topbar-user">
          <div class="user-avatar" id="user-avatar">–</div>
          <div class="user-info">
            <div class="user-name" id="user-name">–</div>
            <div class="user-role" id="user-role">–</div>
          </div>
        </div>
      </div>
    </header>
    <div class="page-content" id="page-content"></div>
  </div>
</div>
<script src="../js/app.js"></script>
<script src="../js/masters.js"></script>
<script>
new MasterPage({
  key:          'sg360_roles',
  dataFile:     '../data/roles.json',
  activeModule: 'role',
  title:        'Role Management',
  subtitle:     'Define system roles and module-level permissions for each user type',
  itemLabel:    'Role',
  idPrefix:     'ROL',
  idField:      'roleId',
  pageSize:     10,

  stats: [
    { label: 'Total Roles',   color: 'green' },
    { label: 'Active',        color: 'teal',   filterKey: 'status', filterValue: 'Active' },
    { label: 'Total Users',   color: 'blue',   countFn: all => all.reduce((s, r) => s + (Number(r.userCount) || 0), 0) },
    { label: 'Admin Roles',   color: 'purple', countFn: all => all.filter(r => ['Super Admin', 'Admin'].includes(r.name)).length }
  ],

  columns: [
    { key: 'roleId',      label: 'Role ID',     type: 'id' },
    { key: 'name',        label: 'Role Name',   type: 'bold' },
    { key: 'description', label: 'Description', type: 'muted' },
    { key: 'permissions', label: 'Permissions', type: 'tags' },
    { key: 'userCount',   label: 'Users',       type: 'number' }
  ],

  searchKeys: ['name', 'roleId', 'description'],

  filters: [
    { field: 'status', label: 'Status', options: ['Active', 'Inactive'] }
  ],

  fields: [
    { name: 'name',        label: 'Role Name',    type: 'text',     required: true,  full: true, placeholder: 'e.g. Security Guard' },
    { name: 'description', label: 'Description',  type: 'textarea', required: false, full: true, placeholder: 'Brief role description and responsibilities' },
    { name: 'permissions', label: 'Permissions',  type: 'checkbox-group', required: false, full: true,
      options: ['Visitor Management', 'Vehicle Management', 'Inventory Management', 'Master Data', 'Reports', 'Settings', 'User Management'] }
  ]
}).init();
</script>
</body>
</html>
