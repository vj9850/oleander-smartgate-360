<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendor Management – SmartGate 360</title>
  <link rel="icon" href="../assets/icons/logo.webp" type="image/webp" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
  <script>(function(){ const s = sessionStorage.getItem('sg360_session'); if (!s) window.location.replace('../index.html'); })();</script>
</head>
<body>
<div class="app-wrapper">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" id="mobile-menu-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <div class="topbar-title">SmartGate 360</div>
          <div class="topbar-breadcrumb">Masters / <span>Vendor Management</span></div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-date" id="topbar-date"></div>
        <div class="topbar-user">
          <div class="user-avatar" id="user-avatar">–</div>
          <div class="user-info">
            <div class="user-name" id="user-name">–</div>
            <div class="user-role" id="user-role">–</div>
          </div>
        </div>
      </div>
    </header>
    <div class="page-content" id="page-content"></div>
  </div>
</div>
<script src="../js/app.js"></script>
<script src="../js/masters.js"></script>
<script>
new MasterPage({
  key:          'sg360_vendors',
  dataFile:     '../data/vendors.json',
  activeModule: 'vendor',
  title:        'Vendor Management',
  subtitle:     'Manage registered vendors, suppliers and service providers',
  itemLabel:    'Vendor',
  idPrefix:     'VND',
  idField:      'vendorId',
  pageSize:     10,

  stats: [
    { label: 'Total Vendors',       color: 'green' },
    { label: 'Active',              color: 'teal',   filterKey: 'status',     filterValue: 'Active' },
    { label: 'Suppliers',           color: 'blue',   filterKey: 'vendorType', filterValue: 'Supplier' },
    { label: 'Maintenance Vendors', color: 'orange', filterKey: 'vendorType', filterValue: 'Maintenance Vendor' }
  ],

  columns: [
    { key: 'vendorId',       label: 'Vendor ID',      type: 'id' },
    { key: 'name',           label: 'Vendor Name',    type: 'bold' },
    { key: 'vendorType',     label: 'Type',           type: 'badge' },
    { key: 'contactPerson',  label: 'Contact Person', type: 'muted' },
    { key: 'mobile',         label: 'Mobile',         type: 'mono' },
    { key: 'serviceCategory',label: 'Service',        type: 'muted' }
  ],

  searchKeys: ['name', 'vendorId', 'vendorType', 'contactPerson', 'mobile', 'companyName', 'serviceCategory'],

  filters: [
    { field: 'vendorType', label: 'Types', options: ['Supplier', 'Maintenance Vendor', 'Event Vendor', 'Food Supplier', 'Laundry Vendor', 'Contractor'] },
    { field: 'status',     label: 'Status', options: ['Active', 'Inactive'] }
  ],

  fields: [
    { name: 'name',            label: 'Vendor Name',      type: 'text',     required: true,  placeholder: 'Short display name' },
    { name: 'companyName',     label: 'Company Name',     type: 'text',     required: true,  placeholder: 'Registered company name' },
    { name: 'vendorType',      label: 'Vendor Type',      type: 'select',   required: true,  options: ['Supplier', 'Maintenance Vendor', 'Event Vendor', 'Food Supplier', 'Laundry Vendor', 'Contractor'] },
    { name: 'contactPerson',   label: 'Contact Person',   type: 'text',     required: true,  placeholder: 'Primary contact name' },
    { name: 'mobile',          label: 'Mobile',           type: 'tel',      required: true,  placeholder: '10-digit mobile' },
    { name: 'email',           label: 'Email',            type: 'email',    required: false, placeholder: 'vendor@email.com' },
    { name: 'serviceCategory', label: 'Service Category', type: 'text',     required: false, placeholder: 'e.g. Groceries & Provisions' },
    { name: 'gstNumber',       label: 'GST Number',       type: 'text',     required: false, placeholder: '15-digit GSTIN' },
    { name: 'address',         label: 'Address',          type: 'textarea', required: false, full: true, placeholder: 'Full business address' }
  ]
}).init();
</script>
</body>
</html>
